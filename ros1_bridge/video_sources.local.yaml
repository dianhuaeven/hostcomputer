rtsp:
  public_host: 192.168.1.83
  publish_host: 127.0.0.1
  port: 8554
  server: mediamtx
  transport: tcp

direct_sources:
  - camera_id: 0
    source_id: paw_realsense
    slot_hint: 0
    name: Paw RealSense
    runner: ffmpeg
    device: /dev/v4l/by-id/usb-Intel_R__RealSense_TM__Depth_Camera_405_Intel_R__RealSense_TM__Depth_Camera_405_260423073235-video-index4
    input_format: yuyv422
    input_width: 1280
    input_height: 720
    width: 960
    height: 720
    fps: 30
    codec: h264
    bitrate_kbps: 2500
    vf: crop=960:720:160:0
    rtsp_path: paw_realsense
    enabled: true

  - camera_id: 1
    source_id: overheadcam
    slot_hint: 1
    name: Overhead Camera
    runner: ffmpeg
    device: /dev/overheadcam
    input_format: mjpeg
    input_width: 1280
    input_height: 720
    width: 960
    height: 720
    fps: 30
    codec: h264
    bitrate_kbps: 2500
    vf: crop=960:720:160:0
    rtsp_path: overheadcam
    enabled: true

  - camera_id: 2
    source_id: pawcam
    slot_hint: 2
    name: Paw Camera
    runner: ffmpeg
    device: /dev/pawcam
    input_format: mjpeg
    input_width: 1280
    input_height: 720
    width: 960
    height: 720
    fps: 30
    codec: h264
    bitrate_kbps: 2500
    vf: crop=960:720:160:0
    rtsp_path: pawcam
    enabled: true

  - camera_id: 3
    source_id: frontcam
    slot_hint: 3
    name: Front Camera
    runner: ffmpeg
    device: /dev/frontcam
    input_format: mjpeg
    input_width: 1280
    input_height: 720
    width: 960
    height: 720
    fps: 30
    codec: h264
    bitrate_kbps: 2500
    vf: crop=960:720:160:0
    rtsp_path: frontcam
    enabled: true

  - camera_id: 4
    source_id: armcam
    slot_hint: 4
    name: Arm Camera
    runner: ffmpeg
    device: /dev/armcam
    input_format: mjpeg
    input_width: 1280
    input_height: 720
    width: 960
    height: 720
    fps: 30
    codec: h264
    bitrate_kbps: 2500
